name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die der direkte Pages-Deploy braucht
permissions:
  contents: read
  pages: write
  id-token: write

# nur ein Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Quarto einrichten
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Quarto rendern
        run: quarto render

      - name: Ergebnis als Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
