<!-- Import map: legt fest, woher "react" und "react-dom" geladen werden.
     Muss im <head> stehen, bevor irgendein Modul-Skript laeuft.
     Damit nutzen unser Mount-Skript und Excalidraw dieselbe React-Instanz
     (sonst gibt es den beruechtigten "Invalid hook call"-Fehler). -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
  }
}
</script>

<!-- Excalidraws eigenes Stylesheet. OHNE dieses CSS klappt die
     Zeichenflaeche auf 0 Pixel zusammen und der Kasten bleibt leer. -->
<link rel="stylesheet"
      href="https://esm.sh/@excalidraw/excalidraw@0.18.1/dist/prod/index.css">
